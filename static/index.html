<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МедЗапись — AI-ассистент врача</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                    <div>
                        <h1>МедЗапись</h1>
                        <span class="subtitle">AI-ассистент врача</span>
                    </div>
                </div>
                <div class="header-actions">
                    <select id="specialtySelect" class="specialty-select">
                        <option value="general">Терапевт</option>
                        <option value="pediatrics">Педиатрия</option>
                        <option value="surgery">Хирургия</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Recording Panel -->
            <section class="panel recording-panel" id="recordingPanel">
                <div class="panel-header">
                    <h2>Запись приёма</h2>
                    <span class="badge" id="statusBadge">Готов к записи</span>
                </div>
                
                <!-- Patient Info (optional) -->
                <div class="patient-info-row">
                    <input type="text" id="patientInfo" class="input-field" 
                           placeholder="ФИО пациента (необязательно)" autocomplete="off">
                </div>

                <!-- Recorder -->
                <div class="recorder-area">
                    <div class="waveform-container" id="waveformContainer">
                        <canvas id="waveformCanvas"></canvas>
                        <div class="timer" id="timer">00:00</div>
                    </div>

                    <div class="recorder-controls">
                        <button class="btn btn-record" id="btnRecord" title="Начать запись">
                            <svg viewBox="0 0 24 24" fill="currentColor" class="icon-mic">
                                <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                            </svg>
                            <span>Начать запись</span>
                        </button>
                        <button class="btn btn-stop hidden" id="btnStop" title="Остановить запись">
                            <svg viewBox="0 0 24 24" fill="currentColor" class="icon-stop">
                                <rect x="6" y="6" width="12" height="12" rx="1"/>
                            </svg>
                            <span>Остановить</span>
                        </button>
                    </div>
                </div>
                
                <!-- Or upload file -->
                <div class="upload-divider">
                    <span>или загрузите аудиофайл</span>
                </div>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="audio/*" hidden>
                    <button class="btn btn-upload" id="btnUpload">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span>Выбрать файл</span>
                    </button>
                    <span class="upload-hint" id="uploadHint">MP3, WAV, OGG, WebM — до 50 МБ</span>
                </div>
                
                <!-- Demo button -->
                <div class="upload-divider">
                    <span>или попробуйте демо</span>
                </div>
                <div style="text-align: center;">
                    <button class="btn btn-demo" id="btnDemo" title="Запустить демонстрацию с примером приёма">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        <span>Демо: пример приёма терапевта</span>
                    </button>
                </div>
            </section>

            <!-- Processing Indicator -->
            <section class="panel processing-panel hidden" id="processingPanel">
                <div class="processing-content">
                    <div class="spinner"></div>
                    <div class="processing-steps">
                        <div class="step active" id="stepTranscribe">
                            <div class="step-dot"></div>
                            <span>Распознавание речи...</span>
                        </div>
                        <div class="step" id="stepStructure">
                            <div class="step-dot"></div>
                            <span>Формирование мед. записи...</span>
                        </div>
                        <div class="step" id="stepDone">
                            <div class="step-dot"></div>
                            <span>Готово</span>
                        </div>
                    </div>
                    <div class="processing-timer" id="processingTimer">0 сек</div>
                </div>
            </section>

            <!-- Result Panel -->
            <section class="panel result-panel hidden" id="resultPanel">
                <div class="panel-header">
                    <h2>Медицинская запись</h2>
                    <div class="result-actions">
                        <button class="btn btn-sm" id="btnCopy" title="Копировать текст">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Копировать
                        </button>
                        <button class="btn btn-sm" id="btnExportPdf" title="Скачать PDF">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            PDF
                        </button>
                        <button class="btn btn-sm" id="btnExportDocx" title="Скачать DOCX">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            DOCX
                        </button>
                        <button class="btn btn-sm btn-new" id="btnNewRecord" title="Новая запись">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Новая запись
                        </button>
                    </div>
                </div>

                <!-- Tabs: Structured / Transcription -->
                <div class="tabs">
                    <button class="tab active" data-tab="structured">Мед. запись</button>
                    <button class="tab" data-tab="transcription">Расшифровка</button>
                </div>

                <!-- Structured result (editable) -->
                <div class="tab-content active" id="tabStructured">
                    <div class="result-meta">
                        <span id="processingTime"></span>
                        <span id="resultSpecialty"></span>
                    </div>
                    <div class="result-editor" id="resultEditor" contenteditable="true"></div>
                </div>

                <!-- Raw transcription -->
                <div class="tab-content" id="tabTranscription">
                    <div class="transcription-text" id="transcriptionText"></div>
                </div>
            </section>

            <!-- Error Panel -->
            <section class="panel error-panel hidden" id="errorPanel">
                <div class="error-content">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <p id="errorMessage">Произошла ошибка</p>
                    <button class="btn" id="btnRetry">Попробовать снова</button>
                </div>
            </section>
        </main>

        <!-- Toast notifications -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="/static/recorder.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
